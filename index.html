<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROBCARD</title>
    <link rel="stylesheet" href="style.css"> <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui-top" class="top-info hidden">
        <span id="label-mode">الوضع: -</span>
        <span id="label-score">النقاط: 0</span>
    </div>

    <div id="screen-start" class="screen">
        <div class="glass-box">
            <h1 style="color: var(--card-red); font-size: 40px;">PROBCARD</h1>
            <button class="main-btn red-btn" onclick="startPlay()">ابدأ اللعب</button>
        </div>
    </div>

    <div id="screen-modes" class="screen hidden">
        <div class="glass-box">
            <h2>اختر الوضع</h2>
            <button class="main-btn" onclick="selectMode('مستقلة')">مستقلة</button>
            <button class="main-btn" onclick="selectMode('غير مستقلة')">غير مستقلة</button>
            <button class="main-btn red-btn" onclick="showScreen('screen-start')">عودة</button>
        </div>
    </div>

    <div id="screen-play" class="screen hidden">
        <div class="glass-box">
            <div class="chart" id="game-chart"></div>
            <div class="card-deck" onclick="drawCard()"></div>
            <button class="main-btn" onclick="showScreen('screen-modes')">تغيير الوضع</button>
        </div>
    </div>

    <script src="script.js"></script> </body>
</html>
